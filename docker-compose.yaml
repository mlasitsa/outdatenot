# TODO: Make some minor config adjustments
services:
  redis:
    image: redis:7.4-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass yourstrongpassword
    volumes:
      - redis_data:/data
volumes:
  redis_data:
    driver: local

  db:
    image: postgres:14-alpine 
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data 
  
  volumes:
  pgdata:

